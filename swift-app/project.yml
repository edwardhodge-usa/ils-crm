name: ILS CRM
options:
  bundleIdPrefix: com.imaginelabstudios
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  ILS CRM:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: 2
        INFOPLIST_KEY_CFBundleDisplayName: "ILS CRM+"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
  ILS CRM UITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ILS CRM UITests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
