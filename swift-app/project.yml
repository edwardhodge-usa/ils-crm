name: ILS CRM
options:
  bundleIdPrefix: com.imaginelabstudios
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

schemes:
  ILS CRM:
    build:
      targets:
        ILS CRM: all
        ILS CRM Tests: [test]
        ILS CRM UITests: [test]
    test:
      environmentVariables:
        - variable: AIRTABLE_API_KEY
          value: $(AIRTABLE_API_KEY)
          isEnabled: true
      targets:
        - name: ILS CRM Tests
        - name: ILS CRM UITests

targets:
  ILS CRM:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: ILS CRM
    info:
      path: ILS CRM/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "ILS CRM+"
        LSApplicationCategoryType: "public.app-category.business"
        SUFeedURL: "https://raw.githubusercontent.com/edwardhodge-usa/ils-crm/main/appcast.xml"
        SUPublicEDKey: "TEYI9o0zD1tc95dmkSIyvCN17FtqT0kXPo3F+pSHatw="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 14400
    dependencies:
      - package: Sparkle
        platformFilter: macos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        MARKETING_VERSION: "1.2.1"
        CURRENT_PROJECT_VERSION: 12
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: "8RHA62T6FQ"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Imaginelab Studios (8RHA62T6FQ)"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: "ILS CRM/ILS CRM.entitlements"
  ILS CRM UITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ILS CRM UITests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
  ILS CRM Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ILS CRM Tests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ILS CRM.app/Contents/MacOS/ILS CRM"
