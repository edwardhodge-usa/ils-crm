name: ILS CRM
options:
  bundleIdPrefix: com.imaginelabstudios
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  ILS CRM:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: ILS CRM
    dependencies:
      - package: Sparkle
        platformFilter: macos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm
        MARKETING_VERSION: "1.0.6"
        CURRENT_PROJECT_VERSION: 7
        INFOPLIST_KEY_CFBundleDisplayName: "ILS CRM+"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
        DEVELOPMENT_TEAM: "8RHA62T6FQ"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: "ILS CRM/ILS CRM.entitlements"
  ILS CRM UITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ILS CRM UITests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
