name: ILS CRM
options:
  bundleIdPrefix: com.imaginelabstudios
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: targeted

# Sparkle dependency intentionally omitted — macOS distribution is Mac App Store
# TestFlight (sandboxed, App-Store-managed updates).
# To rebuild as Developer ID outside the App Store, see CLAUDE.md
# → "Developer ID rebuild (legacy/recovery)".

schemes:
  ILS CRM:
    build:
      targets:
        ILS CRM: all
        ILS CRM Tests: [test]
        ILS CRM UITests: [test]
    test:
      environmentVariables:
        - variable: AIRTABLE_API_KEY
          value: $(AIRTABLE_API_KEY)
          isEnabled: true
      targets:
        - name: ILS CRM Tests
        - name: ILS CRM UITests

targets:
  ILS CRM:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: ILS CRM
    info:
      path: ILS CRM/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: "ILS CRM"
        LSApplicationCategoryType: "public.app-category.business"
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        MARKETING_VERSION: "1.5.1"
        CURRENT_PROJECT_VERSION: 24
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: "8RHA62T6FQ"
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": "ILS CRM/ILS CRM.entitlements"
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": "ILS CRM/ILS CRM iOS.entitlements"
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": "ILS CRM/ILS CRM iOS.entitlements"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
        Release:
          # Mac App Store / TestFlight + iOS TestFlight share this config.
          # CODE_SIGN_IDENTITY is intentionally "Apple Development" — Xcode's
          # automatic signing transparently substitutes "Apple Distribution" at
          # archive time. Pinning to "Apple Distribution" here conflicts with
          # CODE_SIGN_STYLE=Automatic and breaks both `build` and `archive`.
          # Automatic signing fetches the App Store distribution profile, which
          # authorizes keychain-access-groups — Developer ID Manual could not,
          # causing AMFI -413 launch failures in v1.5.0.
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          ENABLE_HARDENED_RUNTIME: YES
  ILS CRM UITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ILS CRM UITests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.uitests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
  ILS CRM Tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ILS CRM Tests
    dependencies:
      - target: ILS CRM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.ils-crm.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ILS CRM.app/Contents/MacOS/ILS CRM"
